<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ABI Car Rental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
            <div class="text-center mb-8">
                <i class="fas fa-car text-4xl text-blue-800 mb-2"></i>
                <h1 class="text-2xl font-bold text-blue-900">ABI Rentals</h1>
                <p class="text-gray-600">Create your account</p>
            </div>
            
            <!-- Registration Form -->
            <div id="registrationForm" class="space-y-4">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
                    <input type="text" id="username" placeholder="johndoe" 
                           class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Phone Number</label>
                    <input type="tel" id="phone" placeholder="09123456789" 
                           class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    <p class="text-xs text-gray-500 mt-1">Will be verified via OTP</p>
                </div>
                
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                    <input type="password" id="password" placeholder="••••••••" 
                           class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                
                <button onclick="initiateRegistration()" 
                        class="w-full bg-blue-800 text-white py-3 rounded-lg font-semibold hover:bg-blue-900 transition">
                    Register
                </button>
                
                <div id="message" class="text-sm text-center hidden"></div>
                
                <p class="text-center text-sm text-gray-600 mt-4">
                    Already have an account? 
                    <a href="/pages/login.html" class="text-blue-800 font-semibold hover:underline">Login here</a>
                </p>
            </div>
            
            <!-- OTP Verification -->
            <div id="otpForm" class="hidden space-y-4">
                <div class="text-center mb-4">
                    <i class="fas fa-shield-alt text-4xl text-green-600 mb-2"></i>
                    <h2 class="text-xl font-bold">Verify Phone</h2>
                    <p class="text-gray-600">Enter the 6-digit code sent to</p>
                    <p class="font-semibold" id="displayPhone"></p>
                </div>
                
                <div>
                    <input type="text" id="otp" placeholder="000000" maxlength="6" 
                           class="w-full px-4 py-3 border rounded-lg text-center text-2xl tracking-widest font-bold">
                </div>
                
                <button onclick="verifyOTP()" 
                        class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition">
                    Verify & Complete Registration
                </button>
                
                <div class="text-center">
                    <button onclick="resendOTP()" class="text-blue-800 text-sm hover:underline">
                        Resend Code
                    </button>
                </div>
                
                <button onclick="showRegistrationForm()" class="text-gray-500 text-sm hover:text-gray-700">
                    ← Back
                </button>
                
                <div id="otpMessage" class="text-sm text-center hidden"></div>
            </div>
        </div>
    </div>

    <script>
        let registrationData = {};

        async function initiateRegistration() {
            const username = document.getElementById('username').value;
            const phone = document.getElementById('phone').value.replace(/\D/g, '');
            const password = document.getElementById('password').value;
            
            if (!username || !phone || !password) {
                showMessage('message', 'Please fill in all fields', true);
                return;
            }
            
            registrationData = { username, phone, password };
            
            try {
                const response = await fetch('/api/auth/request-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('displayPhone').textContent = phone;
                    document.getElementById('registrationForm').classList.add('hidden');
                    document.getElementById('otpForm').classList.remove('hidden');
                    if (data.dev_otp) document.getElementById('otp').value = data.dev_otp;
                } else {
                    showMessage('message', data.error || 'Failed to send OTP', true);
                }
            } catch (error) {
                showMessage('message', 'Connection error', true);
            }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp').value;
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...registrationData, otp })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    showMessage('otpMessage', data.error || 'Invalid OTP', true);
                }
            } catch (error) {
                showMessage('otpMessage', 'Connection error', true);
            }
        }

        function showMessage(elementId, text, isError) {
            const msg = document.getElementById(elementId);
            msg.textContent = text;
            msg.className = `text-sm p-2 rounded ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
